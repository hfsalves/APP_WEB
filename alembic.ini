[alembic]
# path to migration scripts
script_location = migrations

# a tua ligação ao SQL Server; migrations/env.py escolhe o driver ODBC instalado
sqlalchemy.url = mssql+pyodbc://sa:enterprise@192.168.1.50/GESTAO?TrustServerCertificate=Yes

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
