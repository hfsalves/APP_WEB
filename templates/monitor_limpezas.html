<!doctype html>
<html lang="pt">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ page_title or 'Monitor de Limpezas' }}</title>
  <link rel="icon" href="{{ url_for('static', filename='images/favicon.ico') }}">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  <style>
    :root {
      color-scheme: dark;
      --bg: #08110f;
      --panel: #11201d;
      --panel-2: #172c28;
      --line: rgba(255, 255, 255, 0.12);
      --text: #f4fbf8;
      --muted: #9fb4ae;
      --ok: #42d392;
      --active: #54b6ff;
      --warn: #ffd166;
      --danger: #ff5f57;
      --ink: #07100e;
    }

    * { box-sizing: border-box; }

    html,
    body {
      width: 100%;
      min-height: 100%;
      margin: 0;
      background:
        radial-gradient(circle at 10% 0%, rgba(84, 182, 255, 0.14), transparent 32rem),
        linear-gradient(135deg, #07100e 0%, #0f1d1a 48%, #1c2017 100%);
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      letter-spacing: 0;
    }

    body {
      overflow: hidden;
    }

    .ops-screen {
      min-height: 100vh;
      display: grid;
      grid-template-rows: auto auto minmax(0, 1fr);
      gap: 18px;
      padding: clamp(18px, 2vw, 34px);
    }

    .ops-header {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 22px;
      align-items: center;
    }

    .ops-title h1 {
      margin: 0;
      font-size: clamp(34px, 4.6vw, 82px);
      line-height: 0.92;
      font-weight: 900;
    }

    .ops-title p {
      margin: 10px 0 0;
      color: var(--muted);
      font-size: clamp(18px, 1.5vw, 30px);
      font-weight: 650;
    }

    .ops-meta {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 14px;
      min-width: 0;
    }

    .ops-clock {
      text-align: right;
      min-width: 13rem;
    }

    .ops-clock-time {
      font-variant-numeric: tabular-nums;
      font-size: clamp(38px, 5vw, 90px);
      line-height: 0.9;
      font-weight: 950;
    }

    .ops-clock-date,
    .ops-refresh {
      color: var(--muted);
      font-size: clamp(15px, 1.25vw, 22px);
      font-weight: 750;
    }

    .logout-btn {
      width: 58px;
      height: 58px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.07);
      color: var(--text);
      text-decoration: none;
      font-size: 22px;
    }

    .logout-btn:focus,
    .logout-btn:hover {
      background: rgba(255, 255, 255, 0.14);
      outline: none;
    }

    .ops-summary {
      display: grid;
      grid-template-columns: 1.15fr repeat(4, minmax(128px, 0.32fr));
      gap: 14px;
    }

    .progress-panel,
    .metric {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(17, 32, 29, 0.84);
      box-shadow: 0 18px 38px rgba(0, 0, 0, 0.26);
    }

    .progress-panel {
      padding: 18px 20px;
      display: grid;
      gap: 13px;
    }

    .progress-top {
      display: flex;
      justify-content: space-between;
      gap: 18px;
      align-items: baseline;
      font-weight: 850;
      font-size: clamp(19px, 1.75vw, 34px);
    }

    .progress-number {
      color: var(--ok);
      font-variant-numeric: tabular-nums;
      font-size: clamp(30px, 4vw, 62px);
      line-height: 0.9;
    }

    .progress-track {
      height: clamp(16px, 1.6vw, 26px);
      overflow: hidden;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.1);
    }

    .progress-fill {
      width: 0%;
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, var(--ok), #b7f36c);
      transition: width 350ms ease;
    }

    .metric {
      min-width: 0;
      padding: 16px;
      display: grid;
      align-content: center;
      gap: 4px;
    }

    .metric-value {
      font-size: clamp(34px, 4vw, 68px);
      line-height: 0.95;
      font-weight: 950;
      font-variant-numeric: tabular-nums;
    }

    .metric-label {
      color: var(--muted);
      font-size: clamp(14px, 1.08vw, 20px);
      font-weight: 800;
      text-transform: uppercase;
    }

    .metric-danger .metric-value { color: var(--danger); }
    .metric-active .metric-value { color: var(--active); }
    .metric-warn .metric-value { color: var(--warn); }

    .ops-main {
      min-height: 0;
      display: grid;
      grid-template-columns: minmax(270px, 0.34fr) minmax(0, 1fr);
      gap: 18px;
    }

    .priority-panel,
    .board-panel {
      min-height: 0;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(8, 17, 15, 0.74);
      overflow: hidden;
    }

    .priority-panel {
      display: grid;
      grid-template-rows: auto minmax(0, 1fr);
    }

    .panel-title {
      padding: 18px 20px;
      border-bottom: 1px solid var(--line);
      font-size: clamp(18px, 1.5vw, 28px);
      font-weight: 900;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .next-card {
      margin: 18px;
      padding: 18px;
      border-radius: 8px;
      background: var(--panel);
      border: 1px solid var(--line);
    }

    .next-kicker {
      color: var(--muted);
      text-transform: uppercase;
      font-size: clamp(13px, 1vw, 18px);
      font-weight: 900;
    }

    .next-time {
      margin-top: 8px;
      font-size: clamp(44px, 5.5vw, 90px);
      line-height: 0.9;
      font-weight: 950;
      font-variant-numeric: tabular-nums;
    }

    .next-name {
      margin-top: 14px;
      font-size: clamp(22px, 2vw, 38px);
      line-height: 1.08;
      font-weight: 900;
      overflow-wrap: anywhere;
    }

    .next-meta {
      margin-top: 12px;
      color: var(--muted);
      font-size: clamp(16px, 1.2vw, 22px);
      font-weight: 750;
      line-height: 1.35;
    }

    .status-stack {
      display: grid;
      gap: 10px;
      padding: 0 18px 18px;
    }

    .status-row {
      display: grid;
      grid-template-columns: 24px 1fr auto;
      align-items: center;
      gap: 12px;
      padding: 12px 14px;
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.055);
      color: var(--muted);
      font-size: clamp(15px, 1.1vw, 20px);
      font-weight: 850;
    }

    .dot {
      width: 14px;
      height: 14px;
      border-radius: 999px;
      background: var(--muted);
      box-shadow: 0 0 0 5px rgba(255, 255, 255, 0.04);
    }

    .dot-danger { background: var(--danger); }
    .dot-active { background: var(--active); }
    .dot-ok { background: var(--ok); }
    .dot-warn { background: var(--warn); }

    .board-panel {
      display: grid;
      grid-template-rows: auto minmax(0, 1fr);
    }

    .board-head {
      display: grid;
      grid-template-columns: 0.7fr 1.45fr 1fr 0.9fr 1.1fr;
      gap: 14px;
      padding: 14px 20px;
      border-bottom: 1px solid var(--line);
      color: var(--muted);
      font-size: clamp(13px, 1vw, 18px);
      font-weight: 900;
      text-transform: uppercase;
    }

    .board-list {
      min-height: 0;
      overflow: hidden;
      display: grid;
      align-content: start;
    }

    .cleaning-row {
      display: grid;
      grid-template-columns: 0.7fr 1.45fr 1fr 0.9fr 1.1fr;
      gap: 14px;
      align-items: center;
      min-height: clamp(72px, 8.2vh, 114px);
      padding: 14px 20px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
      background: rgba(255, 255, 255, 0.025);
    }

    .cleaning-row[data-tone="danger"] {
      background: linear-gradient(90deg, rgba(255, 95, 87, 0.23), rgba(255, 255, 255, 0.025));
    }

    .cleaning-row[data-tone="active"] {
      background: linear-gradient(90deg, rgba(84, 182, 255, 0.18), rgba(255, 255, 255, 0.025));
    }

    .cleaning-row[data-tone="attention"],
    .cleaning-row[data-tone="warning"] {
      background: linear-gradient(90deg, rgba(255, 209, 102, 0.18), rgba(255, 255, 255, 0.025));
    }

    .time-block {
      font-size: clamp(25px, 2.5vw, 50px);
      line-height: 1;
      font-weight: 950;
      font-variant-numeric: tabular-nums;
    }

    .end-time {
      margin-top: 6px;
      color: var(--muted);
      font-size: clamp(14px, 1.05vw, 20px);
      font-weight: 800;
    }

    .place {
      min-width: 0;
    }

    .place-name {
      font-size: clamp(21px, 2.05vw, 40px);
      line-height: 1.05;
      font-weight: 950;
      overflow-wrap: anywhere;
    }

    .place-extra,
    .team,
    .window {
      color: var(--muted);
      font-size: clamp(15px, 1.12vw, 22px);
      font-weight: 760;
      line-height: 1.25;
      overflow-wrap: anywhere;
    }

    .team strong,
    .window strong {
      display: block;
      color: var(--text);
      font-size: clamp(19px, 1.65vw, 34px);
      line-height: 1.1;
      overflow-wrap: anywhere;
    }

    .status-pill {
      justify-self: start;
      display: inline-flex;
      align-items: center;
      gap: 9px;
      max-width: 100%;
      padding: 10px 13px;
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.08);
      color: var(--text);
      font-size: clamp(15px, 1.15vw, 23px);
      font-weight: 920;
    }

    .status-pill[data-tone="ok"] { background: rgba(66, 211, 146, 0.16); color: #b9f7dc; }
    .status-pill[data-tone="active"] { background: rgba(84, 182, 255, 0.18); color: #c4e8ff; }
    .status-pill[data-tone="danger"] { background: rgba(255, 95, 87, 0.2); color: #ffd2cf; }
    .status-pill[data-tone="warning"],
    .status-pill[data-tone="attention"] { background: rgba(255, 209, 102, 0.18); color: #ffedb4; }

    .empty-state,
    .error-state {
      padding: 44px;
      color: var(--muted);
      font-size: clamp(24px, 2.2vw, 42px);
      font-weight: 850;
    }

    .error-state {
      color: #ffd2cf;
    }

    @media (max-width: 980px) {
      body { overflow: auto; }
      .ops-screen { min-height: 100vh; }
      .ops-header,
      .ops-main,
      .ops-summary {
        grid-template-columns: 1fr;
      }
      .ops-meta { justify-content: space-between; }
      .board-head { display: none; }
      .cleaning-row {
        grid-template-columns: 1fr;
        gap: 10px;
      }
    }
  </style>
</head>
<body>
  <main class="ops-screen" data-current-login="{{ current_login }}">
    <header class="ops-header">
      <div class="ops-title">
        <h1>Limpezas</h1>
        <p id="monitorDateLabel">Hoje</p>
      </div>
      <div class="ops-meta">
        <div class="ops-clock" aria-live="polite">
          <div class="ops-clock-time" id="opsClock">--:--</div>
          <div class="ops-clock-date" id="opsClockDate">--</div>
          <div class="ops-refresh" id="opsRefresh">A atualizar...</div>
        </div>
        <a class="logout-btn" href="{{ url_for('logout') }}" title="Logout" aria-label="Logout">
          <i class="fa-solid fa-right-from-bracket"></i>
        </a>
      </div>
    </header>

    <section class="ops-summary" aria-label="Resumo">
      <div class="progress-panel">
        <div class="progress-top">
          <span>Dia em execucao</span>
          <span class="progress-number" id="progressNumber">0%</span>
        </div>
        <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>
      </div>
      <div class="metric">
        <div class="metric-value" id="metricTotal">0</div>
        <div class="metric-label">Total</div>
      </div>
      <div class="metric metric-active">
        <div class="metric-value" id="metricRunning">0</div>
        <div class="metric-label">Em curso</div>
      </div>
      <div class="metric metric-danger">
        <div class="metric-value" id="metricLate">0</div>
        <div class="metric-label">Atrasos</div>
      </div>
      <div class="metric metric-warn">
        <div class="metric-value" id="metricOpen">0</div>
        <div class="metric-label">Por fechar</div>
      </div>
    </section>

    <section class="ops-main">
      <aside class="priority-panel">
        <div class="panel-title"><i class="fa-solid fa-bolt"></i><span>Agora</span></div>
        <div>
          <article class="next-card" id="nextCard">
            <div class="next-kicker">Proxima limpeza</div>
            <div class="next-time">--:--</div>
            <div class="next-name">Sem dados</div>
            <div class="next-meta">A aguardar atualizacao.</div>
          </article>
          <div class="status-stack">
            <div class="status-row"><span class="dot dot-danger"></span><span>Atrasadas</span><strong id="stackLate">0</strong></div>
            <div class="status-row"><span class="dot dot-active"></span><span>Em curso</span><strong id="stackRunning">0</strong></div>
            <div class="status-row"><span class="dot dot-warn"></span><span>Por iniciar</span><strong id="stackPlanned">0</strong></div>
            <div class="status-row"><span class="dot dot-ok"></span><span>Concluidas</span><strong id="stackDone">0</strong></div>
          </div>
        </div>
      </aside>

      <section class="board-panel">
        <div class="board-head">
          <span>Hora</span>
          <span>Alojamento</span>
          <span>Equipa</span>
          <span>Janela</span>
          <span>Estado</span>
        </div>
        <div class="board-list" id="cleaningBoard" aria-live="polite"></div>
      </section>
    </section>
  </main>

  <script src="{{ url_for('static', filename='js/monitor_limpezas.js') }}?v={{ config.get('STATIC_VERSION', 1) }}"></script>
</body>
</html>
