{% extends "base.html" %}
{% block title %}{{ _('dashboard.title') }}{% endblock %}
{% block content %}
<div class="sz_page sz_dashboard_page">
  <div class="sz_page_container">
    <div class="sz_contextbar sz_page_contextbar sz_dashboard_contextbar">
      <div class="sz_contextbar_left">
        <div class="sz_breadcrumbs">{{ _('dashboard.breadcrumb') }}</div>
        <div class="sz_page_title">{{ _('dashboard.title') }}</div>
        <div class="sz_page_subtitle">{{ _('dashboard.subtitle') }}</div>
      </div>
    </div>

    <section class="sz_page_body sz_dashboard_body">
      <div class="sz_dashboard_grid">
        <div class="sz_dashboard_col" id="col-1"></div>
        <div class="sz_dashboard_col" id="col-2"></div>
        <div class="sz_dashboard_col" id="col-3"></div>
      </div>
    </section>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="/static/js/dashboard.js"></script>
{% endblock %}
