{% extends "base.html" %}

{% block title %}Login{% endblock %}

{% block content %}
<div class="login-page">
  <div class="login-card">
    <div class="login-card-header">
      <div class="login-logo-wrap">
        <img src="{{ url_for('static', filename='images/icon-512.png') }}" alt="Aplicacao" class="login-logo" loading="lazy">
      </div>
      <div class="login-brand">
        <h1 class="login-title">StationZero</h1>
        <p class="login-subtitle">Operations Platform</p>
      </div>
    </div>

    {% if error %}
      <div class="alert alert-danger mb-3">{{ error }}</div>
    {% endif %}

    <form method="post" action="{{ url_for('login') }}" class="login-form">
      <div class="form-group">
        <label for="login">Email or username</label>
        <div class="input-with-icon">
          <i class="fa-solid fa-user"></i>
          <input type="text" id="login" name="login" class="form-control" required autocomplete="username" placeholder="Enter email or username">
        </div>
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <div class="input-with-icon">
          <i class="fa-solid fa-lock"></i>
          <input type="password" id="password" name="password" class="form-control" required autocomplete="current-password">
        </div>
      </div>
      <button type="submit" class="btn btn-primary w-100">
        <i class="fa-solid fa-arrow-right-to-bracket me-1"></i>
        Iniciar sess&atilde;o
      </button>
      <div class="login-actions">
        <a href="#" class="login-forgot-link">Forgot password?</a>
      </div>
    </form>
    <div class="login-card-footer">Secure login &bull; StationZero &bull; v1.0</div>
  </div>
</div>
{% endblock %}
