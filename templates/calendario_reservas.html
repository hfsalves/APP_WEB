{% extends 'base.html' %}

{% block title %}Calendário de Reservas{% endblock %}

{% block content %}
<div class="sz_page">
  <div class="sz_page_container rescal-page">
    <header class="sz_contextbar sz_page_contextbar rescal-contextbar">
      <div class="sz_contextbar_left">
        <div class="sz_page_title">Calendário de Reservas</div>
        <div class="sz_page_subtitle rescal-subtitle">
          <span class="sz_badge sz_badge_info">Timeline</span>
          <span id="rescalRange">--</span>
          <span class="sz_badge sz_badge_warning rescal-kpi" id="rescalUnsyncedKpi">0 por sincronizar</span>
        </div>
      </div>
      <div class="sz_contextbar_right">
        <div class="rescal-toolbar">
          <input class="sz_input rescal-filter-input" id="rescalFilter" placeholder="Filtrar alojamento...">
          <label class="sz_checkbox rescal-toggle" for="rescalShowBlocked">
            <input type="checkbox" id="rescalShowBlocked">
            <span>Mostrar bloqueios</span>
          </label>
          <button class="sz_button sz_button_secondary rescal-icon-button" id="rescalPrev30" title="Recuar 30 dias" type="button">
            <i class="fa-solid fa-arrow-left"></i>
          </button>
          <button class="sz_button sz_button_secondary rescal-icon-button" id="rescalNext30" title="Avançar 30 dias" type="button">
            <i class="fa-solid fa-arrow-right"></i>
          </button>
          <button class="sz_button sz_button_secondary" id="rescalToday" type="button">
            <i class="fa-solid fa-location-crosshairs"></i>
            <span>Hoje</span>
          </button>
          <button class="sz_button sz_button_primary" id="rescalReload" type="button">
            <i class="fa-solid fa-rotate"></i>
            <span>Atualizar</span>
          </button>
        </div>
      </div>
    </header>

    <section class="sz_page_body">
      <div class="sz_page_content">
        <section class="sz_panel rescal-panel">
          <div class="rescal-timeline-wrap">
            <div id="rescalTimeline" class="rescal-timeline"></div>
            <div class="rescal-hscroll" id="rescalHScroll">
              <div class="rescal-hscroll-inner" id="rescalHScrollInner"></div>
            </div>
            <div class="rescal-loading d-none" id="rescalLoading">
              <div class="spinner-border rescal-spinner" role="status"></div>
              <div class="rescal-loading-text">A carregar reservas...</div>
            </div>
          </div>
        </section>
      </div>
    </section>
  </div>
</div>

<!-- Modal: edição de preços -->
<div class="modal fade" id="rescalPriceModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered modal-md">
    <div class="modal-content border-0 shadow rescal-modal">
      <div class="modal-header border-0 pb-0 rescal-modal-header">
        <h5 class="modal-title">Preço por noite</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Fechar"></button>
      </div>
      <div class="modal-body pt-3">
        <div class="mb-3">
          <div class="text-muted small">Alojamento(s)</div>
          <div id="rescalSelAloj" class="fw-semibold"></div>
        </div>
        <div class="mb-3">
          <div class="text-muted small">Data / Período</div>
          <div id="rescalSelPeriodo" class="fw-semibold"></div>
        </div>

        <div class="row g-2 align-items-end rescal-modal-fields">
          <div class="col-4">
            <label class="form-label small mb-1">Preço base</label>
            <input type="number" class="form-control form-control-sm" id="rescalPBase" min="0" step="1" placeholder="--">
          </div>
          <div class="col-4">
            <label class="form-label small mb-1">Desconto</label>
            <select class="form-select form-select-sm" id="rescalDesc">
              <option value="">--</option>
              <option value="0">0%</option>
              <option value="10">10%</option>
              <option value="20">20%</option>
              <option value="30">30%</option>
              <option value="40">40%</option>
              <option value="50">50%</option>
              <option value="60">60%</option>
            </select>
          </div>
          <div class="col-4">
            <label class="form-label small mb-1">Preço final</label>
            <input type="number" class="form-control form-control-sm" id="rescalPrecoFinal" readonly>
          </div>
        </div>
        <div class="text-muted small mt-2" id="rescalPriceHint"></div>
      </div>
      <div class="modal-footer border-0 pt-0">
        <div class="me-auto d-flex align-items-center gap-2">
          <button type="button" class="btn btn-sm btn-outline-danger d-none" id="rescalBqToggleBtn">
            <i class="fa-solid fa-lock me-1"></i> Bloquear
          </button>
        </div>
        <button type="button" class="btn btn-sm btn-light" id="rescalCancelSel">Cancelar</button>
        <button type="button" class="btn btn-sm btn-primary px-3" id="rescalSavePrices">
          <i class="fa-solid fa-check me-1"></i>Gravar
        </button>
      </div>
    </div>
  </div>
</div>

<style>
  .rescal-page {
    height: 100%;
    min-height: 0;
    --rescal-price-color: color-mix(in srgb, var(--sz-color-text) 92%, transparent);
    --rescal-discount-color: color-mix(in srgb, var(--sz-color-danger) 95%, transparent);
  }
  .rescal-page .sz_page_body,
  .rescal-page .sz_page_content {
    height: 100%;
    min-height: 0;
  }
  .rescal-page .sz_page_content {
    display: flex;
    flex-direction: column;
  }
  .rescal-contextbar .sz_page_subtitle {
    display: flex;
    align-items: center;
    gap: var(--sz-space-2);
    flex-wrap: nowrap;
  }
  .rescal-contextbar .sz_contextbar_left {
    width: auto;
    flex: 0 1 auto;
    min-width: 0;
  }
  .rescal-contextbar .sz_contextbar_right {
    flex: 1 1 auto;
    min-width: 0;
  }
  .rescal-toolbar {
    display: flex;
    align-items: center;
    justify-content: flex-end;
    gap: var(--sz-space-2);
    flex-wrap: nowrap;
  }
  .rescal-filter-input {
    width: min(240px, 100%);
    min-width: 220px;
  }
  .rescal-toggle {
    white-space: nowrap;
  }
  .rescal-kpi {
    white-space: nowrap;
  }
  .rescal-icon-button {
    min-width: 2.625rem;
    padding-inline: 0.75rem;
  }
  .rescal-panel {
    flex: 1 1 auto;
    height: 100%;
    min-height: 0;
    display: flex;
    flex-direction: column;
    padding: 0.75rem;
  }
  .rescal-timeline-wrap { position: relative; flex: 1 1 auto; min-height: 0; display: flex; flex-direction: column; }
  .rescal-timeline {
    flex: 1 1 auto;
    min-height: 0;
    border: 1px solid var(--sz-color-border);
    border-radius: 16px;
    background: var(--sz-color-surface);
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }
  .rescal-timeline .vis-timeline { flex: 1 1 auto; min-height: 0; }
  .rescal-loading {
    position: absolute; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    background: color-mix(in srgb, var(--sz-color-surface) 84%, transparent);
    backdrop-filter: blur(6px);
    z-index: 5;
    height: 19px !important;
    margin-top: 4px !important;
    margin-bottom: 4px !important;
    height: 19px !important;
  }
  .rescal-spinner { color: var(--sz-color-primary); }
  .rescal-loading-text {
    margin-top: 0.5rem;
    font-size: var(--sz-font-size-sm);
    color: var(--sz-color-text-muted);
  }

  /* vis-timeline tweaks */
  .vis-timeline { border: none !important; }
  .vis-panel.vis-left {
    background: color-mix(in srgb, var(--sz-color-surface-alt) 92%, var(--sz-color-surface));
    border-right: 1px solid var(--sz-color-border);
    overflow: hidden;
  }
  .vis-panel.vis-center { overflow-y: hidden; overflow-x: hidden; scrollbar-gutter: auto !important; scrollbar-width: none; padding-left: 0 !important; }
  .vis-panel.vis-center::-webkit-scrollbar { height: 0 !important; }
  .vis-panel.vis-center .vis-content { overflow-x: hidden !important; overflow-y: hidden !important; scrollbar-gutter: auto !important; padding-right: 0 !important; margin-right: 0 !important; padding-left: 0 !important; margin-left: 0 !important; scrollbar-width: none; }
  .vis-panel.vis-center .vis-content::-webkit-scrollbar { height: 0 !important; }

  .rescal-hscroll {
    margin-top: 6px;
    margin-left: 240px;
    height: 12px;
    overflow-x: auto;
    overflow-y: hidden;
    scrollbar-width: thin;
    scrollbar-color: color-mix(in srgb, var(--sz-color-text-muted) 45%, transparent) transparent;
  }
  .rescal-hscroll::-webkit-scrollbar { height: 12px; }
  .rescal-hscroll::-webkit-scrollbar-track { background: transparent; }
  .rescal-hscroll::-webkit-scrollbar-thumb {
    background-color: color-mix(in srgb, var(--sz-color-text-muted) 35%, transparent);
    border-radius: 999px;
    border: 2px solid transparent;
    background-clip: content-box;
  }
  .rescal-hscroll-inner { height: 1px; }

  /* largura fixa da coluna de alojamentos */
  .rescal-timeline .vis-panel.vis-left { width: 240px !important; }
  .rescal-timeline .vis-panel.vis-center { left: 240px !important; width: calc(100% - 240px) !important; }
  .rescal-timeline .vis-panel.vis-top.vis-center { width: calc(100% - 240px) !important; }
  .rescal-timeline .vis-panel.vis-top.vis-center .vis-time-axis { margin-left: 0 !important; padding-left: 0 !important; }

  /* Scrollbars do vis-timeline (discretas, sem mexer no layout/overflow do vis) */
  .vis-panel.vis-center,
  .vis-panel.vis-bottom,
  .vis-panel.vis-right,
  .vis-panel.vis-center .vis-content,
  .vis-panel.vis-bottom .vis-content,
  .vis-panel.vis-right .vis-content {
    scrollbar-width: thin; /* Firefox */
    scrollbar-color: color-mix(in srgb, var(--sz-color-text-muted) 45%, transparent) transparent;
    scrollbar-gutter: stable;
  }
  .vis-panel.vis-center::-webkit-scrollbar,
  .vis-panel.vis-bottom::-webkit-scrollbar,
  .vis-panel.vis-right::-webkit-scrollbar,
  .vis-panel.vis-center .vis-content::-webkit-scrollbar,
  .vis-panel.vis-bottom .vis-content::-webkit-scrollbar,
  .vis-panel.vis-right .vis-content::-webkit-scrollbar { height: 10px; width: 10px; }
  .vis-panel.vis-center::-webkit-scrollbar-track,
  .vis-panel.vis-bottom::-webkit-scrollbar-track,
  .vis-panel.vis-right::-webkit-scrollbar-track,
  .vis-panel.vis-center .vis-content::-webkit-scrollbar-track,
  .vis-panel.vis-bottom .vis-content::-webkit-scrollbar-track,
  .vis-panel.vis-right .vis-content::-webkit-scrollbar-track { background: transparent; }
  .vis-panel.vis-center::-webkit-scrollbar-thumb,
  .vis-panel.vis-bottom::-webkit-scrollbar-thumb,
  .vis-panel.vis-right::-webkit-scrollbar-thumb,
  .vis-panel.vis-center .vis-content::-webkit-scrollbar-thumb,
  .vis-panel.vis-bottom .vis-content::-webkit-scrollbar-thumb,
  .vis-panel.vis-right .vis-content::-webkit-scrollbar-thumb {
    background-color: color-mix(in srgb, var(--sz-color-text-muted) 35%, transparent);
    border-radius: 999px;
    border: 2px solid transparent;
    background-clip: content-box;
  }
  .vis-panel.vis-center::-webkit-scrollbar-thumb:hover,
  .vis-panel.vis-bottom::-webkit-scrollbar-thumb:hover,
  .vis-panel.vis-right::-webkit-scrollbar-thumb:hover,
  .vis-panel.vis-center .vis-content::-webkit-scrollbar-thumb:hover,
  .vis-panel.vis-bottom .vis-content::-webkit-scrollbar-thumb:hover,
  .vis-panel.vis-right .vis-content::-webkit-scrollbar-thumb:hover { background-color: color-mix(in srgb, var(--sz-color-text-muted) 55%, transparent); }
  .vis-labelset .vis-label { border-bottom: 1px solid color-mix(in srgb, var(--sz-color-border) 72%, transparent); height: 36px !important; }
  .vis-itemset .vis-group { height: 36px !important; }
  .vis-panel.vis-left .vis-labelset .vis-label .vis-inner {
    display: flex;
    align-items: center;
    min-width: 0;
    font-size: 11px;
    font-weight: 700;
    color: var(--sz-color-text);
  }
  .rescal-group-label {
    display: inline-flex;
    align-items: center;
    gap: 0.45rem;
    min-width: 0;
    width: 100%;
  }
  .rescal-group-name {
    flex: 1 1 auto;
    min-width: 0;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .rescal-group-badge {
    flex: 0 0 auto;
    min-width: 1.5rem;
    min-height: 1rem;
    padding: 0.08rem 0.36rem;
    font-size: 0.62rem;
    line-height: 1;
    white-space: nowrap;
  }
  .vis-time-axis .vis-grid.vis-minor { border-color: color-mix(in srgb, var(--sz-color-border) 72%, transparent); }
  .vis-time-axis .vis-grid.vis-major { border-color: var(--sz-color-border); }
  .vis-time-axis .vis-text.vis-minor {
    color: var(--sz-color-text);
    font-size: 12px;
    line-height: 1.05;
    text-align: center;
  }
  .vis-time-axis .vis-text.vis-minor .rescal-dow {
    font-size: 10px;
    color: var(--sz-color-text-muted);
    font-weight: 600;
    line-height: 1;
  }
  .vis-time-axis .vis-text.vis-minor .rescal-dom {
    font-size: 12px;
    color: var(--sz-color-text);
    font-weight: 700;
    line-height: 1.1;
  }
  .vis-time-axis .vis-text.vis-major { color: var(--sz-color-text); font-weight: 700; font-size: 12px; }
  .vis-current-time { background-color: color-mix(in srgb, var(--sz-color-danger) 35%, transparent) !important; width: 1px !important; }
  .weekend-bg { background: color-mix(in srgb, var(--sz-color-text-muted) 18%, transparent) !important; }
  .vis-item.vis-background.weekend-bg { pointer-events: none; }
  .vis-item.vis-background.cell-sel {
    background: color-mix(in srgb, var(--sz-color-primary) 18%, transparent) !important;
    box-shadow: none !important;
  }
  .vis-item.vis-background.cell-sel { z-index: 1; pointer-events: none; }

  /* Cadeados (noites bloqueadas) */
  .vis-item.vis-background.bq-lock { background: transparent !important; z-index: 2; pointer-events: auto; }
  .vis-item.vis-background.bq-lock .bq-lock-icon {
    position: absolute;
    right: 4px;
    bottom: 2px;
    font-size: 11px;
    line-height: 1;
    opacity: 0.8;
    pointer-events: none;
  }
  .vis-item.vis-background.bq-lock.bq-treated .bq-lock-icon { color: var(--sz-color-info); }
  .vis-item.vis-background.bq-lock.bq-pending .bq-lock-icon { color: var(--sz-color-danger); }
  .vis-item.vis-background.bq-lock.bq-unlock .bq-lock-icon { color: var(--sz-color-warning); }

  /* Preços por célula (PRECOS/AL.PBASE) */
  .vis-item.pbase-item {
    background: transparent !important;
    border: none !important;
    box-shadow: none !important;
    z-index: 1;
    pointer-events: none;
    font-size: 10px !important;
    height: 0 !important;
    min-height: 0 !important;
    padding: 0 !important;
  }
  .vis-item.pbase-item .vis-item-overflow {
    overflow: visible !important;
    position: relative;
    height: 0 !important;
  }
  .vis-item.pbase-item .vis-item-content {
    padding: 0 !important;
    width: 100% !important;
    height: 0 !important;
    position: relative !important;
    display: block !important;
    font-size: 10px !important;
    overflow: visible !important;
  }
  .vis-item.pbase-item .pbase-wrap { position: relative; width: 100%; height: 100%; }
  .vis-item.pbase-item .pbase-wrap.pbase-unsynced::before,
  .pbase-wrap.pbase-unsynced::before {
    content: '';
    position: absolute;
    top: 4px;
    left: 4px;
    width: 5px;
    height: 5px;
    border-radius: 50%;
    background: var(--sz-color-danger);
    box-shadow: 0 0 0 1px color-mix(in srgb, var(--sz-color-surface) 65%, transparent);
  }
  .vis-item.pbase-item .pbase-price {
    position: absolute;
    top: 2px;
    right: 4px;
    font-size: 12px !important;
    font-weight: 700 !important;
    color: color-mix(in srgb, var(--sz-color-text) 92%, transparent) !important;
    line-height: 1 !important;
  }
  .vis-item.pbase-item .pbase-discount {
    position: absolute;
    left: 9px;
    bottom: 2px;
    font-size: 9px !important;
    font-weight: 800 !important;
    color: color-mix(in srgb, var(--sz-color-danger) 95%, transparent) !important;
    line-height: 1 !important;
  }

  /* Fallback mais permissivo (caso o className fique noutro nível do DOM do vis) */
  .pbase-item { pointer-events: none !important; }
  .pbase-item .vis-item-content { position: relative !important; }
  .pbase-wrap { position: relative !important; width: 100% !important; height: 100% !important; }
  .pbase-price {
    position: absolute !important;
    top: 2px !important;
    right: 4px !important;
    left: auto !important;
    font-size: 12px !important;
    font-weight: 700 !important;
    color: color-mix(in srgb, var(--sz-color-text) 92%, transparent) !important;
    line-height: 1 !important;
  }
  .pbase-discount {
    position: absolute !important;
    left: 9px !important;
    bottom: 0px !important; /* mais em baixo */
    font-size: 9px !important;
    font-weight: 800 !important;
    color: color-mix(in srgb, var(--sz-color-danger) 95%, transparent) !important;
    line-height: 1 !important;
  }
  .vis-item.rs-item {
    background: linear-gradient(
      90deg,
      color-mix(in srgb, var(--sz-color-info) 35%, transparent),
      color-mix(in srgb, var(--sz-color-primary) 25%, transparent)
    );
    border: 1px solid color-mix(in srgb, var(--sz-color-primary) 65%, var(--sz-color-border));
    border-radius: 8px;
    color: var(--sz-color-text);
    z-index: 5; /* garantir acima de backgrounds (cadeados/seleção/fins-de-semana) */
  }
  .vis-item.rs-item { height: 19px !important; transform: translateY(4px); }
  .vis-item.rs-item.vis-range { top: 4px !important; }
  .vis-item.rs-item .vis-item-overflow {
    border-radius: 8px;
    height: 19px !important;
  }
  .vis-item.rs-item.vis-range {
    border-radius: 8px;
    height: 19px !important;
  }
  .vis-item.rs-item .vis-item-content {
    padding: 0 8px;
    font-weight: 700;
    font-size: 10px;
    height: 19px !important;
    line-height: 1.1 !important;
    display: flex;
    align-items: center;
    position: relative;
    top: -4px !important;
  }
  .vis-item.rs-item .rs-label { display: inline-block; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 100%; position: relative; top: -4px !important; }
  .vis-item.vis-selected.rs-item {
    box-shadow: 0 10px 30px color-mix(in srgb, var(--sz-color-text) 25%, transparent);
    border-color: color-mix(in srgb, var(--sz-color-info) 95%, var(--sz-color-primary));
  }

  /* Modal preços */
  .rescal-modal {
    border-radius: 16px;
    background: linear-gradient(
      180deg,
      var(--sz-color-surface) 0%,
      color-mix(in srgb, var(--sz-color-surface-alt) 92%, var(--sz-color-surface)) 100%
    );
    color: var(--sz-color-text);
    border: 1px solid var(--sz-color-border);
  }
  .rescal-modal-header .modal-title {
    font-weight: 700;
    color: var(--sz-color-text);
  }
  .rescal-modal-header .modal-title::after {
    content: "Definir preco e desconto";
    display: block;
    font-weight: 500;
    font-size: 12px;
    color: var(--sz-color-text-secondary);
    margin-top: 4px;
  }
  .rescal-modal .text-muted,
  .rescal-modal .small,
  .rescal-modal .form-label {
    color: var(--sz-color-text-secondary) !important;
  }
  .rescal-modal .modal-body { padding: 1.25rem 1.5rem; }
  .rescal-modal .modal-footer { padding: 0 1.5rem 1.25rem; }
  .rescal-modal-fields .form-control,
  .rescal-modal-fields .form-select {
    border-radius: 10px;
    background: var(--sz-color-surface);
    color: var(--sz-color-text);
    border-color: var(--sz-color-border);
    box-shadow: inset 0 0 0 1px color-mix(in srgb, var(--sz-color-border) 75%, transparent);
  }
  .rescal-modal-fields .form-control:focus,
  .rescal-modal-fields .form-select:focus {
    background: var(--sz-color-surface);
    color: var(--sz-color-text);
    border-color: color-mix(in srgb, var(--sz-color-primary) 65%, var(--sz-color-border));
    box-shadow: 0 0 0 3px color-mix(in srgb, var(--sz-color-primary) 15%, transparent);
  }
  .rescal-modal .btn-outline-danger,
  .rescal-modal .btn-light,
  .rescal-modal .btn-primary {
    border-radius: 10px;
  }
  .rescal-modal .btn-light {
    background: var(--sz-color-surface-alt);
    border-color: var(--sz-color-border);
    color: var(--sz-color-text);
  }
  .rescal-modal .btn-light:hover {
    background: color-mix(in srgb, var(--sz-color-surface-alt) 80%, var(--sz-color-surface));
    border-color: var(--sz-color-border);
    color: var(--sz-color-text);
  }
  .rescal-modal .btn-primary {
    background: var(--sz-color-primary);
    border-color: var(--sz-color-primary);
  }
  .rescal-modal .btn-outline-danger {
    color: var(--sz-color-danger);
    border-color: color-mix(in srgb, var(--sz-color-danger) 70%, var(--sz-color-border));
  }
  .rescal-modal .btn-outline-danger:hover {
    background: color-mix(in srgb, var(--sz-color-danger) 12%, transparent);
    color: var(--sz-color-danger);
    border-color: color-mix(in srgb, var(--sz-color-danger) 85%, var(--sz-color-border));
  }

  @media (max-width: 960px) {
    .rescal-contextbar .sz_page_subtitle {
      flex-wrap: wrap;
    }
    .rescal-contextbar .sz_contextbar_left {
      width: 100%;
      flex: 1 1 auto;
    }
    .rescal-contextbar .sz_contextbar_right {
      width: 100%;
      flex: 1 1 auto;
    }
    .rescal-toolbar {
      width: 100%;
      justify-content: flex-start;
      flex-wrap: wrap;
    }
    .rescal-filter-input {
      min-width: 0;
      flex: 1 1 220px;
    }
