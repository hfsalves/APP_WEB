{% extends "base.html" %}
{% block title %}{{ table_name|capitalize }}{% endblock %}

{% block content %}
<div class="sz_page">
  <div class="sz_page_container sz_dynamic_list_container">
    <header class="sz_page_header">
      <div class="sz_contextbar sz_page_contextbar">
        <div class="sz_contextbar_left">
          <h1 class="sz_page_title">{{ page_name or page_title or (table_name|upper) }}</h1>
          <p id="recordCount" class="sz_page_subtitle"></p>
        </div>
        <div class="sz_contextbar_right">
          <div class="dynamic-list-actions sz_dynamic_list_actions">
            <button id="btnFilterToggle" class="sz_button sz_button_ghost">
              <i class="fa fa-filter"></i>
              <span>Filtrar</span>
            </button>
            {% if user_perms[table_name].inserir %}
              {% if table_name == 'FO' %}
                <button id="btnNewAttachment" class="sz_button sz_button_secondary btn-attach-custom">
                  <i class="fa fa-paperclip"></i>
                  <span>+ Anexo</span>
                </button>
              {% endif %}
              <button id="btnNew" class="sz_button sz_button_primary">
                <i class="fa fa-plus"></i>
                <span>Novo</span>
              </button>
            {% endif %}
          </div>
        </div>
      </div>
    </header>

    <div class="sz_page_body sz_dynamic_list_body">
      <section id="grid" class="sz_table_host"></section>
    </div>
  </div>
</div>

<!-- Modal de Filtros -->
<div id="modalFiltros" class="sz_modal" aria-labelledby="modalFiltrosLabel" aria-hidden="true">
  <div class="sz_panel sz_dynamic_filters_modal_panel">
    <div class="sz_modal_header sz_dynamic_filters_header">
      <h3 class="sz_h4 sz_modal_title" id="modalFiltrosLabel">Filtros</h3>
      <button type="button" id="closeFiltersModalTop" class="sz_button sz_button_ghost" aria-label="Fechar">
        <i class="fa-solid fa-xmark"></i>
      </button>
    </div>
    <div class="sz_modal_body sz_dynamic_filters_modal_body">
      <!-- O form sera injetado aqui pelo JS -->
      <form id="filter-form" class="sz_dynamic_filters_form sz_dynamic_filters_form_mobile_2col"></form>
    </div>
    <div class="sz_modal_footer">
      <button type="button" id="closeFiltersModal" class="sz_button sz_button_secondary">
        <i class="fa-solid fa-ban"></i>
        <span>Cancelar</span>
      </button>
      <button type="button" id="clearFilters" class="sz_button sz_button_ghost">
        <i class="fa-solid fa-rotate-left"></i>
        <span>Limpar</span>
      </button>
      <button type="button" id="applyFilters" class="sz_button sz_button_primary">
        <i class="fa-solid fa-check"></i>
        <span>Aplicar</span>
      </button>
    </div>
  </div>
</div>

<script>
  window.TABLE_NAME = "{{ table_name }}";
  window.TABLE_FORM = {{ menu_forms.get(table_name)|tojson }};
</script>
<script src="{{ url_for('static', filename='js/dynamic_list.js') }}"></script>
{% endblock %}
