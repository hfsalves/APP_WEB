<!doctype html>
<html lang="{{ lang }}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>PortoBreak.com - {{ page_title }}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/booking_portal.css') }}?v={{ config.get('STATIC_VERSION', 1) }}">
</head>
<body>
  <main class="booking-shell booking-detail-shell">
    <nav class="booking-nav booking-topbar-light" aria-label="{{ t.page_reservations }}">
      <a class="booking-brand" href="{{ url_for('booking_portal.index', lang=lang) }}" aria-label="PortoBreak.com">
        <img src="{{ url_for('static', filename='images/booking_portal/portobreak-logo-simple.png') }}" alt="PortoBreak.com">
      </a>
      <div class="booking-language-switcher booking-language-switcher-nav" aria-label="Language">
        {% for item in language_links %}
          <a href="{{ item.url }}" class="{% if item.active %}is-active{% endif %}" lang="{{ item.code }}">{{ item.label }}</a>
        {% endfor %}
      </div>
    </nav>

    <section class="booking-login-card">
      <p class="booking-kicker booking-kicker-dark">{{ t.account }}</p>
      <h1>{{ t.password_recovery }}</h1>
      <p>{{ t.password_recovery_lead }}</p>
      {% if recovery_status %}
        <div class="booking-alert booking-alert-success"><p>{{ recovery_status }}</p></div>
      {% else %}
        <form method="post" class="booking-login-form">
          <label class="booking-form-field">
            <span>{{ t.email }}</span>
            <input name="email" type="email" value="{{ recovery_email }}" autocomplete="email" required maxlength="255">
          </label>
          <button class="booking-button booking-button-primary booking-button-wide" type="submit">{{ t.send_password_reset }}</button>
        </form>
      {% endif %}
      <a class="booking-form-link" href="{{ url_for('booking_portal.login', lang=lang) }}">{{ t.login }}</a>
    </section>
  </main>
</body>
</html>
